services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tina
      POSTGRES_PASSWORD: tina
      POSTGRES_DB: tina
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
